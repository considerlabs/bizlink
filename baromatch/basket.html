<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>바로매치 | 장바구니</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bm-page" id="page-root">
  <div id="bm-back-header"></div>
  <div id="cart-content"></div>
  <div id="cart-footer"></div>
  <div id="bm-bottom-nav"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
let selectedIds = new Set();

function loadCartItems() {
  return getCart().map(i => ({ ...i, svc: bmSvc(i.id) }));
}

function renderCart() {
  const items = loadCartItems();
  const pageRoot = document.getElementById('page-root');

  if (items.length === 0) {
    document.getElementById('cart-content').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:110px 24px 0;text-align:center">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <p style="font-size:14px;color:#9ca3af;margin-top:16px;line-height:1.6">장바구니가 비어있습니다.<br>마음에 드는 상품을 담아보세요!</p>
        <a href="index.html" class="bm-btn-primary" style="margin-top:18px;height:44px;padding:0 28px">쇼핑 계속하기</a>
      </div>`;
    document.getElementById('cart-footer').innerHTML = '';
    pageRoot.style.paddingBottom = '';
    return;
  }

  selectedIds = new Set([...selectedIds].filter(id => items.some(i => i.id === id)));
  if (selectedIds.size === 0) items.forEach(i => selectedIds.add(i.id));
  const allSelected = items.every(i => selectedIds.has(i.id));

  document.getElementById('cart-content').innerHTML = `
    <div style="padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between">
      <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:#1f2937;cursor:pointer">
        <input type="checkbox" id="select-all" ${allSelected ? 'checked' : ''} style="width:18px;height:18px;accent-color:#1a2260">
        전체선택
      </label>
      <button id="delete-selected" style="background:none;border:none;color:#9ca3af;font-size:13px;font-weight:600;cursor:pointer">선택삭제</button>
    </div>
    <div style="padding:0 16px">
      ${items.map(i => `
        <div style="position:relative;display:flex;gap:12px;padding:16px 0;border-bottom:1px solid #f3f4f6">
          <input type="checkbox" class="item-check" data-id="${i.id}" ${selectedIds.has(i.id) ? 'checked' : ''} style="width:18px;height:18px;accent-color:#1a2260;margin-top:4px;flex-shrink:0">
          <div style="width:64px;height:64px;border-radius:0.75rem;background:${i.svc.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:26px">${i.svc.icon}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:#1f2937;padding-right:24px">${escapeHtml(i.svc.name)}</div>
            <div style="font-size:12px;color:#9ca3af;margin-top:2px">기본옵션</div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
              <div style="display:flex;align-items:center;gap:8px">
                <button class="bm-qty-btn cart-dec" data-id="${i.id}">−</button>
                <span class="bm-qty-val">${i.qty}</span>
                <button class="bm-qty-btn cart-inc" data-id="${i.id}">+</button>
              </div>
              <span style="font-size:14.5px;font-weight:800;color:#1f2937">${comma(i.svc.price * i.qty)}원</span>
            </div>
          </div>
          <button class="cart-remove" data-id="${i.id}" aria-label="삭제" style="position:absolute;top:14px;right:0;width:22px;height:22px;border-radius:9999px;background:#f3f4f6;border:none;color:#9ca3af;cursor:pointer;font-size:13px;line-height:1">✕</button>
        </div>
      `).join('')}
    </div>`;

  const subtotal = items.filter(i => selectedIds.has(i.id)).reduce((sum, i) => sum + i.svc.price * i.qty, 0);
  const fee = Math.round(subtotal * BM_PLATFORM_FEE_RATE);
  const total = subtotal + fee;
  const selectedCount = items.filter(i => selectedIds.has(i.id)).length;

  document.getElementById('cart-footer').innerHTML = `
    <div style="position:fixed;left:50%;transform:translateX(-50%);bottom:70px;width:100%;max-width:480px;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,0.06);padding:14px 16px;z-index:25">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#6b7280;margin-bottom:6px"><span>상품금액</span><span>${comma(subtotal)}원</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#6b7280;margin-bottom:10px"><span>관리수수료 (5.5%)</span><span>${comma(fee)}원</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #e5e7eb;margin-bottom:12px">
        <span style="font-size:14px;font-weight:700;color:#374151">결제예정금액</span>
        <span style="font-size:19px;font-weight:800;color:#1a2260">${comma(total)}원</span>
      </div>
      <button id="checkout-btn" class="bm-btn-primary" style="width:100%;height:48px;font-size:15px" ${selectedCount === 0 ? 'disabled' : ''}>결제하기 ( ${selectedCount} )</button>
    </div>`;
  pageRoot.style.paddingBottom = 'calc(70px + 148px + env(safe-area-inset-bottom))';

  bindCartEvents(items);
}

function bindCartEvents(items) {
  document.getElementById('select-all').addEventListener('change', e => {
    if (e.target.checked) items.forEach(i => selectedIds.add(i.id));
    else selectedIds.clear();
    renderCart();
  });
  document.getElementById('delete-selected').addEventListener('click', () => {
    if (selectedIds.size === 0) return;
    showBmConfirm('선택한 상품을 삭제하시겠습니까?', () => {
      removeFromCart([...selectedIds]);
      renderCart();
      renderBmNav('basket');
    });
  });
  document.querySelectorAll('.item-check').forEach(chk => chk.addEventListener('change', () => {
    if (chk.checked) selectedIds.add(chk.dataset.id); else selectedIds.delete(chk.dataset.id);
    renderCart();
  }));
  document.querySelectorAll('.cart-remove').forEach(btn => btn.addEventListener('click', () => {
    removeFromCart(btn.dataset.id);
    selectedIds.delete(btn.dataset.id);
    renderCart();
    renderBmNav('basket');
  }));
  document.querySelectorAll('.cart-dec').forEach(btn => btn.addEventListener('click', () => {
    const item = getCart().find(i => i.id === btn.dataset.id);
    updateCartQty(btn.dataset.id, (item?.qty ?? 1) - 1);
    renderCart();
  }));
  document.querySelectorAll('.cart-inc').forEach(btn => btn.addEventListener('click', () => {
    const item = getCart().find(i => i.id === btn.dataset.id);
    updateCartQty(btn.dataset.id, (item?.qty ?? 1) + 1);
    renderCart();
  }));
  document.getElementById('checkout-btn')?.addEventListener('click', () => {
    const chosen = items.filter(i => selectedIds.has(i.id)).map(i => ({ id: i.id, qty: i.qty }));
    if (chosen.length === 0) return;
    setCheckoutItems(chosen);
    window.location.href = 'checkout.html';
  });
}

renderBmBackHeader('장바구니', '<span style="font-size:13px;font-weight:700;color:#9ca3af">편집</span>');
renderCart();
renderBmNav('basket');
</script>
</body>
</html>
