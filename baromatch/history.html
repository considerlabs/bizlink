<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>바로매치 | 결제내역</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bm-page">
  <div id="bm-back-header"></div>
  <div id="history-content" style="padding:14px 16px"></div>
  <div id="bm-bottom-nav"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
function formatDate(d) { return d.replace(/-/g, '.'); }

function renderHistory() {
  const orders = getHistory();
  const el = document.getElementById('history-content');

  if (orders.length === 0) {
    el.innerHTML = `<div style="padding:100px 24px 0;text-align:center;color:#9ca3af;font-size:14px">결제 내역이 없습니다.</div>`;
    return;
  }

  el.innerHTML = orders.map((order) => {
    const first = bmSvc(order.items[0].id);
    const extra = order.items.length - 1;
    const title = extra > 0 ? `${first.name} 외 ${extra}건` : first.name;
    const qtyLabel = order.items.length === 1 ? `수량 ${order.items[0].qty}개` : `총 ${order.items.reduce((s, i) => s + i.qty, 0)}개`;
    return `
    <div class="surface-card" style="background:#fff;border-radius:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.06);padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:12px;color:#9ca3af">${formatDate(order.date)} · ${order.orderNo}</span>
        <span style="background:#eef1fb;color:#1a2260;font-size:11px;font-weight:800;padding:4px 10px;border-radius:9999px">결제완료</span>
      </div>
      <div style="display:flex;gap:12px;padding-bottom:12px;border-bottom:1px solid #f3f4f6;margin-bottom:12px">
        <div style="width:52px;height:52px;border-radius:0.75rem;background:${first.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span style="font-size:22px">${first.icon}</span>
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:#1f2937">${escapeHtml(title)}</div>
          <div style="font-size:12px;color:#9ca3af;margin-top:2px">기본옵션 · ${qtyLabel}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:14.5px;font-weight:800;color:#1f2937">총 ${comma(order.total)}원</span>
        <a href="order-detail.html?no=${encodeURIComponent(order.orderNo)}" class="bm-btn-secondary" style="height:32px;padding:0 14px;font-size:12.5px">상세보기</a>
      </div>
    </div>`;
  }).join('');
}

renderBmBackHeader('결제내역');
renderHistory();
renderBmNav('history');
</script>
</body>
</html>
