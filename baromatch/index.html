<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>바로매치 | 매칭요청</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bm-page">
  <header style="position:sticky;top:0;z-index:20;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.06);padding:14px 16px 10px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div style="display:flex;align-items:center;gap:5px">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1a2260" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span style="font-size:1.0625rem;font-weight:800;color:#1a2260">바로매치</span>
        <span style="font-size:10px;color:#9ca3af;font-weight:700;letter-spacing:0.02em;margin-left:1px">BARO MATCH</span>
      </div>
      <div style="text-align:right;line-height:1.5;flex-shrink:0">
        <div style="font-size:10.5px;color:#9ca3af">1회한도 <b style="color:#1a2260;font-size:12px">1,000,000원</b></div>
        <div style="font-size:10.5px;color:#9ca3af">월한도 <b style="color:#1a2260;font-size:12px">3,000,000원</b></div>
      </div>
    </div>
    <div class="bm-tabs" id="bm-tabs" style="margin-top:12px"></div>
  </header>

  <div style="padding:14px 16px 0">
    <div style="display:flex;justify-content:flex-end;position:relative;margin-bottom:12px">
      <button class="bm-sort-btn" id="bm-sort-btn">높은가격순
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="bm-sort-menu" id="bm-sort-menu" style="display:none"></div>
    </div>
    <div class="bm-grid" id="bm-grid"></div>
  </div>

  <div id="bm-bottom-nav"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
const SORT_OPTIONS = [
  { key: 'price-desc', label: '높은가격순' },
  { key: 'price-asc',  label: '낮은가격순' },
  { key: 'rating',     label: '평점순' },
  { key: 'default',    label: '기본순' },
];

const state = { category: 'delivery', sort: 'price-desc', qty: {} };

function qtyOf(id) { return state.qty[id] ?? 1; }

function renderTabs() {
  document.getElementById('bm-tabs').innerHTML = BM_CATEGORIES.map(c => `
    <button class="bm-tab ${c.key === state.category ? 'active' : ''}" data-cat="${c.key}">${c.label}</button>
  `).join('');
  document.querySelectorAll('.bm-tab').forEach(btn => {
    btn.addEventListener('click', () => { state.category = btn.dataset.cat; renderTabs(); renderGrid(); });
  });
}

function sortedServices() {
  const list = BM_SERVICES.filter(s => s.category === state.category);
  const sorted = [...list];
  if (state.sort === 'price-desc') sorted.sort((a, b) => b.price - a.price);
  else if (state.sort === 'price-asc') sorted.sort((a, b) => a.price - b.price);
  else if (state.sort === 'rating') sorted.sort((a, b) => b.rating - a.rating);
  return sorted;
}

function renderGrid() {
  const list = sortedServices();
  document.getElementById('bm-grid').innerHTML = list.map(svc => `
    <div class="bm-card">
      ${svcImageHtml(svc, 150)}
      <div class="bm-card-body">
        <div class="bm-card-name">${escapeHtml(svc.name)}</div>
        <div class="bm-card-price">${comma(svc.price)}원</div>
        <div class="bm-card-rating">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          ${svc.rating} (${svc.reviews})
        </div>
        <div class="bm-card-footer">
          <button class="bm-qty-btn" data-act="dec" data-id="${svc.id}">−</button>
          <span class="bm-qty-val">${qtyOf(svc.id)}</span>
          <button class="bm-qty-btn" data-act="inc" data-id="${svc.id}">+</button>
          <button class="bm-add-btn" data-act="add" data-id="${svc.id}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            담기
          </button>
        </div>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('[data-act="dec"]').forEach(btn => btn.addEventListener('click', () => {
    state.qty[btn.dataset.id] = Math.max(1, qtyOf(btn.dataset.id) - 1);
    renderGrid();
  }));
  document.querySelectorAll('[data-act="inc"]').forEach(btn => btn.addEventListener('click', () => {
    state.qty[btn.dataset.id] = qtyOf(btn.dataset.id) + 1;
    renderGrid();
  }));
  document.querySelectorAll('[data-act="add"]').forEach(btn => btn.addEventListener('click', () => {
    const svc = bmSvc(btn.dataset.id);
    addToCart(svc.id, qtyOf(svc.id));
    state.qty[svc.id] = 1;
    renderGrid();
    renderBmNav('index');
    showBmToast(`${svc.name}을(를) 장바구니에 담았습니다.`);
  }));
}

function renderSortMenu() {
  document.getElementById('bm-sort-menu').innerHTML = SORT_OPTIONS.map(o => `
    <button class="bm-sort-opt ${o.key === state.sort ? 'active' : ''}" data-sort="${o.key}">${o.label}</button>
  `).join('');
  document.querySelectorAll('.bm-sort-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      state.sort = btn.dataset.sort;
      document.getElementById('bm-sort-btn').firstChild.textContent = SORT_OPTIONS.find(o => o.key === state.sort).label + ' ';
      document.getElementById('bm-sort-menu').style.display = 'none';
      renderSortMenu();
      renderGrid();
    });
  });
}

document.getElementById('bm-sort-btn').addEventListener('click', e => {
  e.stopPropagation();
  const menu = document.getElementById('bm-sort-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
});
document.addEventListener('click', () => { document.getElementById('bm-sort-menu').style.display = 'none'; });

renderTabs();
renderSortMenu();
renderGrid();
renderBmNav('index');
</script>
</body>
</html>
