<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>로그인 - BIZLINK</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: { 50:'#eef0f9',100:'#d4d8f0',200:'#a9b1e1',300:'#7e8ad2',400:'#5a6abf',500:'#2B3990',600:'#24307a',700:'#1a2260' }, navy:'#1a2260' },
        boxShadow: { card:'0 2px 8px rgba(0,0,0,0.08)', popup:'0 8px 32px rgba(0,0,0,0.18)' }
      }}
    };
  </script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <style>
    .login-right { background: linear-gradient(to bottom right, #1e3a8a, #2B3990, #eef2ff); display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 1.5rem; box-shadow: 0 8px 32px rgba(0,0,0,0.18); overflow: hidden; }
    .login-mobile-logo { display: flex; }
    .login-left-panel { display: none; }
    .recovery-modal-overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); padding: 1rem; }
    .recovery-modal { width: 100%; max-width: 420px; background: #fff; border-radius: 1.25rem; box-shadow: 0 8px 32px rgba(0,0,0,0.18); overflow: hidden; }
    .recovery-tab { color: #2B3990; border-bottom: 3px solid #2B3990; font-weight: 800; padding: 0.875rem 0; text-align: center; }
    .recovery-field { display: flex; flex-direction: column; gap: 0.5rem; }
    .recovery-field label { font-size: 0.8125rem; font-weight: 800; color: #374151; }
    @media (min-width: 768px) {
      .login-right { background: #fff; width: 50% !important; }
      .login-card { border-radius: 0; box-shadow: none; }
      .login-mobile-logo { display: none; }
      .login-left-panel { display: flex; }
    }
  </style>
</head>
<body>
  <div style="min-height:100vh;display:flex">
    <!-- Left branding panel (desktop only) -->
    <div class="login-left-panel" style="width:50%;align-items:center;justify-content:center;background:linear-gradient(160deg,#f4f6fb 0%,#e3e8f5 100%)">
      <div style="text-align:center">
        <img src="img/logo-vertical.jpg" alt="BIZLINK" style="width:220px;height:auto;object-fit:contain;margin:0 auto 14px">
        <p style="font-size:0.875rem;color:#9ca3af">B2B 구매대행 플랫폼</p>
      </div>
    </div>

    <!-- Right: login form -->
    <div class="login-right" style="width:100%;padding:1rem">
      <div class="w-full max-w-sm login-card">
        <div class="px-8 pt-10 pb-8">
          <div class="login-mobile-logo" style="justify-content:center;margin-bottom:2rem">
            <img src="img/logo-horizontal.jpg" alt="BIZLINK" style="height:40px;width:auto;object-fit:contain">
          </div>
          <h2 class="text-center text-sm font-semibold text-gray-500 mb-6" style="display:block">B2B 구매대행 플랫폼</h2>

          <form id="login-form" class="space-y-3">
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">아이디</label>
              <input id="login-id" type="text" placeholder="아이디를 입력하세요" class="form-field w-full h-11 text-sm" autocomplete="username">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">비밀번호</label>
              <input id="login-pw" type="password" placeholder="비밀번호를 입력하세요" class="form-field w-full h-11 text-sm" autocomplete="current-password">
            </div>

            <div class="flex items-center justify-between pt-1">
              <label class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer">
                <input type="checkbox" id="save-id" class="rounded"> 아이디 저장
              </label>
              <label class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer">
                <input type="checkbox" id="auto-login" class="rounded"> 자동 로그인
              </label>
            </div>

            <button type="submit" class="btn-primary w-full h-11 text-sm mt-2" style="border-radius:0.75rem">
              로그인
            </button>
          </form>

          <div class="flex justify-center gap-4 mt-4">
            <button id="find-id-btn" type="button" class="text-xs text-gray-400 hover:text-primary-500">아이디 찾기</button>
            <span class="text-gray-200">|</span>
            <button id="reset-pw-btn" type="button" class="text-xs text-gray-400 hover:text-primary-500">비밀번호 재설정</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Auto-fill saved id
    if (localStorage.getItem('ID_SAVE_YN') === 'Y') {
      document.getElementById('login-id').value = localStorage.getItem('LOGIN_ID') || '';
      document.getElementById('save-id').checked = true;
    }
    if (localStorage.getItem('AUTO_LOGIN_YN') === 'Y') {
      document.getElementById('auto-login').checked = true;
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value;
      const saveId = document.getElementById('save-id').checked;
      const autoLogin = document.getElementById('auto-login').checked;

      if (!id || !pw) { showAlert('아이디와 비밀번호를 입력해주세요.'); return; }

      try {
        await api.login(id, pw);
        if (saveId) { localStorage.setItem('ID_SAVE_YN', 'Y'); localStorage.setItem('LOGIN_ID', id); }
        else { localStorage.removeItem('ID_SAVE_YN'); localStorage.removeItem('LOGIN_ID'); }
        if (autoLogin) localStorage.setItem('AUTO_LOGIN_YN', 'Y');
        else localStorage.removeItem('AUTO_LOGIN_YN');
        window.location.href = 'order.html';
      } catch (err) {
        showAlert(err.message);
      }
    });

    const RECOVERY_ACCOUNT = {
      id: localStorage.getItem('LOGIN_ID') || 'bizlink-demo',
      bizNum: MOCK_STORE_INFO.BIZ_NUM,
      phone: '010-1234-5678',
    };
    const recoveryState = { type: null, primary: '', bizNum1: '', bizNum2: '', bizNum3: '', phone: '', code: '', verified: false };

    function normalizePhone(value) {
      return String(value ?? '').replace(/\D/g, '');
    }

    function closeRecoveryModal() {
      document.getElementById('recovery-modal')?.remove();
      recoveryState.type = null;
      recoveryState.primary = '';
      recoveryState.bizNum1 = '';
      recoveryState.bizNum2 = '';
      recoveryState.bizNum3 = '';
      recoveryState.phone = '';
      recoveryState.code = '';
      recoveryState.verified = false;
    }

    function openRecoveryModal(type) {
      recoveryState.type = type;
      recoveryState.primary = '';
      recoveryState.bizNum1 = '';
      recoveryState.bizNum2 = '';
      recoveryState.bizNum3 = '';
      recoveryState.phone = '';
      recoveryState.code = '';
      recoveryState.verified = false;
      renderRecoveryModal('form');
    }

    function recoveryTitle() {
      return recoveryState.type === 'find-id' ? '아이디 찾기' : '비밀번호 재설정';
    }

    function renderRecoveryModal(step) {
      document.getElementById('recovery-modal')?.remove();
      const modal = document.createElement('div');
      modal.id = 'recovery-modal';
      modal.className = 'recovery-modal-overlay';
      modal.innerHTML = `
        <div class="recovery-modal">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid #f3f4f6">
            <h3 style="font-size:1.25rem;font-weight:900;color:#1a2260">${recoveryTitle()}</h3>
            <button id="recovery-close-btn" type="button" style="border:none;background:none;color:#9ca3af;font-size:1.5rem;line-height:1;cursor:pointer">×</button>
          </div>
          <div style="padding:0 1.5rem 1.5rem">
            <div class="recovery-tab">휴대폰 인증</div>
            ${step === 'result' ? recoveryResultHtml() : step === 'password' ? recoveryPasswordHtml() : recoveryFormHtml()}
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('recovery-close-btn').addEventListener('click', closeRecoveryModal);
      modal.addEventListener('click', e => { if (e.target === modal) closeRecoveryModal(); });
      bindRecoveryEvents(step);
    }

    function recoveryFormHtml() {
      const isFindId = recoveryState.type === 'find-id';
      return `
        <div style="display:flex;flex-direction:column;gap:1rem;padding-top:1.25rem">
          ${isFindId ? `
          <div class="recovery-field">
            <label for="recovery-biznum-1">사업자번호</label>
            <div style="display:flex;align-items:center;gap:8px">
              <input id="recovery-biznum-1" type="text" class="form-field" style="height:2.75rem;text-align:center" inputmode="numeric" maxlength="3" placeholder="000" value="${escapeHtml(recoveryState.bizNum1)}">
              <span style="color:#9ca3af">-</span>
              <input id="recovery-biznum-2" type="text" class="form-field" style="height:2.75rem;text-align:center" inputmode="numeric" maxlength="2" placeholder="00" value="${escapeHtml(recoveryState.bizNum2)}">
              <span style="color:#9ca3af">-</span>
              <input id="recovery-biznum-3" type="text" class="form-field" style="height:2.75rem;text-align:center" inputmode="numeric" maxlength="5" placeholder="00000" value="${escapeHtml(recoveryState.bizNum3)}">
            </div>
          </div>` : `
          <div class="recovery-field">
            <label for="recovery-primary">아이디</label>
            <input id="recovery-primary" type="text" class="form-field" style="height:2.75rem" placeholder="아이디를 입력해 주세요" value="${escapeHtml(recoveryState.primary)}">
          </div>`}
          <div class="recovery-field">
            <label for="recovery-phone">휴대폰 번호</label>
            <input id="recovery-phone" type="tel" class="form-field" style="height:2.75rem" placeholder="휴대폰 번호를 입력해 주세요" inputmode="tel" value="${escapeHtml(recoveryState.phone)}">
          </div>
          <button id="recovery-send-btn" type="button" class="btn-primary" style="width:100%;height:3rem;border-radius:0.625rem" disabled>${recoveryState.code ? '인증번호 다시 받기' : '인증번호 받기'}</button>
          <div id="recovery-code-wrap" style="display:${recoveryState.code ? 'flex' : 'none'};flex-direction:column;gap:1rem">
            <div class="recovery-field">
              <label for="recovery-code">인증번호</label>
              <input id="recovery-code" type="text" class="form-field" style="height:2.75rem" placeholder="인증번호 6자리를 입력해 주세요" inputmode="numeric" maxlength="6">
            </div>
            <button id="recovery-verify-btn" type="button" class="btn-primary" style="width:100%;height:3rem;border-radius:0.625rem">확인</button>
          </div>
        </div>
      `;
    }

    function recoveryResultHtml() {
      return `
        <div style="padding-top:1.5rem;text-align:center">
          <p style="font-size:0.8125rem;color:#6b7280;margin-bottom:0.75rem">휴대폰 인증이 완료되었습니다.</p>
          <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:0.875rem;padding:1rem">
            <p style="font-size:0.75rem;color:#9ca3af;margin-bottom:0.25rem">회원님의 아이디</p>
            <p style="font-size:1.125rem;font-weight:900;color:#2B3990">${escapeHtml(RECOVERY_ACCOUNT.id)}</p>
          </div>
          <button id="recovery-login-fill-btn" type="button" class="btn-primary" style="width:100%;height:3rem;margin-top:1rem;border-radius:0.625rem">로그인하러 가기</button>
        </div>
      `;
    }

    function recoveryPasswordHtml() {
      return `
        <div style="display:flex;flex-direction:column;gap:1rem;padding-top:1.25rem">
          <p style="font-size:0.8125rem;color:#6b7280;line-height:1.5">휴대폰 인증이 완료되었습니다. 새 비밀번호를 입력해 주세요.</p>
          <div class="recovery-field">
            <label for="new-password">새 비밀번호</label>
            <input id="new-password" type="password" class="form-field" style="height:2.75rem" placeholder="새 비밀번호를 입력해 주세요" autocomplete="new-password">
          </div>
          <div class="recovery-field">
            <label for="new-password-confirm">새 비밀번호 확인</label>
            <input id="new-password-confirm" type="password" class="form-field" style="height:2.75rem" placeholder="새 비밀번호를 다시 입력해 주세요" autocomplete="new-password">
          </div>
          <button id="password-save-btn" type="button" class="btn-primary" style="width:100%;height:3rem;border-radius:0.625rem">비밀번호 재설정</button>
        </div>
      `;
    }

    function bindRecoveryEvents(step) {
      if (step === 'result') {
        document.getElementById('recovery-login-fill-btn').addEventListener('click', () => {
          document.getElementById('login-id').value = RECOVERY_ACCOUNT.id;
          closeRecoveryModal();
        });
        return;
      }
      if (step === 'password') {
        document.getElementById('password-save-btn').addEventListener('click', () => {
          const pw = document.getElementById('new-password').value;
          const confirmPw = document.getElementById('new-password-confirm').value;
          if (pw.length < 4) { showAlert('새 비밀번호를 4자 이상 입력해주세요.'); return; }
          if (pw !== confirmPw) { showAlert('새 비밀번호가 일치하지 않습니다.'); return; }
          localStorage.setItem('MOCK_RESET_PASSWORD_ID', RECOVERY_ACCOUNT.id);
          showAlert('비밀번호가 재설정되었습니다.', closeRecoveryModal);
        });
        return;
      }

      const isFindId = recoveryState.type === 'find-id';
      const phone = document.getElementById('recovery-phone');
      const sendBtn = document.getElementById('recovery-send-btn');

      if (isFindId) {
        const biznum1 = document.getElementById('recovery-biznum-1');
        const biznum2 = document.getElementById('recovery-biznum-2');
        const biznum3 = document.getElementById('recovery-biznum-3');
        const updateSendState = () => {
          recoveryState.bizNum1 = biznum1.value.replace(/\D/g, '').slice(0, 3);
          recoveryState.bizNum2 = biznum2.value.replace(/\D/g, '').slice(0, 2);
          recoveryState.bizNum3 = biznum3.value.replace(/\D/g, '').slice(0, 5);
          recoveryState.primary = `${recoveryState.bizNum1}-${recoveryState.bizNum2}-${recoveryState.bizNum3}`;
          recoveryState.phone = phone.value.trim();
          sendBtn.disabled = recoveryState.bizNum1.length < 3 || recoveryState.bizNum2.length < 2 || recoveryState.bizNum3.length < 5 || normalizePhone(phone.value).length < 10;
        };
        biznum1.addEventListener('input', () => { updateSendState(); if (biznum1.value.length >= 3) biznum2.focus(); });
        biznum2.addEventListener('input', () => { updateSendState(); if (biznum2.value.length >= 2) biznum3.focus(); });
        biznum3.addEventListener('input', updateSendState);
        phone.addEventListener('input', updateSendState);
        updateSendState();
      } else {
        const primary = document.getElementById('recovery-primary');
        const updateSendState = () => {
          recoveryState.primary = primary.value.trim();
          recoveryState.phone = phone.value.trim();
          sendBtn.disabled = !primary.value.trim() || normalizePhone(phone.value).length < 10;
        };
        primary.addEventListener('input', updateSendState);
        phone.addEventListener('input', updateSendState);
        updateSendState();
      }

      sendBtn.addEventListener('click', () => {
        recoveryState.code = String(Math.floor(100000 + Math.random() * 900000));
        renderRecoveryModal('form');
        showAlert(`인증번호가 발송되었습니다.\n인증번호: ${recoveryState.code}`);
      });

      document.getElementById('recovery-verify-btn')?.addEventListener('click', () => {
        const code = document.getElementById('recovery-code').value.trim();
        if (code !== recoveryState.code) { showAlert('인증번호가 일치하지 않습니다.'); return; }
        recoveryState.verified = true;
        renderRecoveryModal(recoveryState.type === 'find-id' ? 'result' : 'password');
      });
    }

    document.getElementById('find-id-btn').addEventListener('click', () => openRecoveryModal('find-id'));
    document.getElementById('reset-pw-btn').addEventListener('click', () => openRecoveryModal('reset-pw'));
  </script>
</body>
</html>
