<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>공급자관리 - BIZLINK</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: { 50:'#eef0f9',100:'#d4d8f0',400:'#5a6abf',500:'#2B3990',600:'#24307a',700:'#1a2260' }, navy:'#1a2260' },
        boxShadow: { card:'0 2px 8px rgba(0,0,0,0.08)', popup:'0 8px 32px rgba(0,0,0,0.18)' }
      }}
    };
  </script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/header.js"></script>
  <style>
    @media (max-width: 767px) {
      .vr-tab-btn { padding: 10px 12px !important; font-size: 0.75rem !important; }
      .vr-card { padding: 20px 16px !important; }
      .vr-grid-2 { grid-template-columns: 1fr !important; gap: 16px !important; }
      .vr-doc-row { flex-direction: column !important; align-items: flex-start !important; }
      .vr-doc-row .vr-doc-btn { align-self: stretch !important; justify-content: center !important; }
    }
  </style>
</head>
<body>
<div class="app-page">
  <div id="app-header"></div>
  <div class="app-main" style="max-width:1900px">

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid #e5e7eb;background:#fff;border-radius:1rem 1rem 0 0;overflow:hidden">
      <button id="tab-register" class="vr-tab-btn" onclick="setTab('register')" style="display:flex;align-items:center;gap:6px;border-bottom:2px solid #2B3990;padding:12px 24px;font-size:0.875rem;font-weight:800;color:#24307a;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        공급자 등록
      </button>
      <button id="tab-approval" class="vr-tab-btn" onclick="setTab('approval')" style="display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;padding:12px 24px;font-size:0.875rem;font-weight:800;color:#6b7280;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        공급자 승인내역
      </button>
    </div>

    <div id="tab-content"></div>
  </div>
</div>

<script>
if (!requireAuth()) throw new Error();
renderHeader();

let activeTab = 'register';
let registerData = {};

const BANKS = ['국민은행', '신한은행', '하나은행', '우리은행', '농협은행', '기업은행'];
const LABEL_STYLE = 'font-size:0.75rem;font-weight:700;color:#9ca3af;display:block;margin-bottom:6px';

const CONTRACT_STYLE = { '구매대행': 'background:#f5f3ff;color:#7c3aed', '결제대행': 'background:#eff6ff;color:#2563eb' };
const REMIT_TYPE_STYLE = { '통장지급': 'background:#ecfdf5;color:#059669', '페이지급': 'background:#f5f3ff;color:#7c3aed' };
const STAT_STYLE = { APPROVED: 'background:#eef0f9;color:#2B3990', REVIEWING: 'background:#fef9c3;color:#a16207', REJECTED: 'background:#fef2f2;color:#dc2626' };

const REGISTER_DOC_ITEMS = [
  { label: '사업자등록증', id: 'doc-biz-license', badge: '필수 1', badgeColor: 'background:#fef2f2;color:#ef4444', hint: 'PDF·JPG·PNG (최대 10MB)', required: true,  accept: '.pdf,.jpg,.jpeg,.png' },
  { label: '통장사본',     id: 'doc-bankbook',    badge: '필수 2', badgeColor: 'background:#fef2f2;color:#ef4444', hint: 'PDF·JPG·PNG (최대 10MB)', required: true,  accept: '.pdf,.jpg,.jpeg,.png' },
  { label: '거래명세표',   id: 'doc-statement',   badge: '선택 3', badgeColor: 'background:#eff6ff;color:#3b82f6', hint: '최근 1개월 이내 / PDF·JPG·PNG·HWP·XLSX (최대 10MB)', required: false, accept: '.pdf,.jpg,.jpeg,.png,.hwp,.xlsx' },
];

function badgeHtml(text, style) {
  return `<span style="font-size:0.75rem;font-weight:700;padding:4px 10px;border-radius:9999px;white-space:nowrap;${style}">${escapeHtml(text)}</span>`;
}

function setTab(tab) {
  activeTab = tab;
  const btnR = document.getElementById('tab-register');
  const btnA = document.getElementById('tab-approval');
  btnR.style.borderBottomColor = tab === 'register' ? '#2B3990' : 'transparent';
  btnR.style.color = tab === 'register' ? '#24307a' : '#6b7280';
  btnA.style.borderBottomColor = tab === 'approval' ? '#2B3990' : 'transparent';
  btnA.style.color = tab === 'approval' ? '#24307a' : '#6b7280';
  renderTab();
}

function renderTab() {
  const content = document.getElementById('tab-content');
  if (activeTab === 'register') {
    renderRegister(content);
  } else {
    renderApproval(content);
  }
}

function radioBoxHtml(name, options, selected) {
  return `<div class="form-field" style="height:40px;display:flex;align-items:center;gap:24px">
    ${options.map(opt => `
      <label style="display:flex;align-items:center;gap:6px;font-size:0.875rem;color:#1a2260;cursor:pointer;font-weight:500">
        <input type="radio" name="${name}" value="${opt}" ${opt === selected ? 'checked' : ''} style="accent-color:#2B3990;width:16px;height:16px">
        ${opt}
      </label>`).join('')}
  </div>`;
}

// Matches the read-only radio display used on vendor-detail.html
function radioStaticHtml(options, selected) {
  return `<div class="form-field" style="height:40px;gap:20px;background:#f9fafb">
    ${options.map(opt => `
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:0.875rem;font-weight:${opt === selected ? '700' : '500'};color:${opt === selected ? '#1a2260' : '#c7cad1'}">
        <span style="width:14px;height:14px;border-radius:50%;border:2px solid ${opt === selected ? '#2B3990' : '#d1d5db'};display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">
          ${opt === selected ? '<span style="width:6px;height:6px;border-radius:50%;background:#2B3990"></span>' : ''}
        </span>
        ${opt}
      </span>`).join('')}
  </div>`;
}

function renderRegister(content) {
  const d = registerData;

  content.innerHTML = `
    <div class="vr-card" style="margin:20px auto 0;width:100%;max-width:860px;border-radius:0 0 1rem 1rem;border:1px solid #e5e7eb;background:#fff;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #f3f4f6">
        <div style="width:20px;height:20px;border-radius:50%;background:#2B3990;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <span style="font-size:0.9375rem;font-weight:800;color:#1a2260">신규 공급자 등록</span>
      </div>
      <form id="register-form">
        <div class="vr-grid-2" style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px">
          <div>
            <label style="${LABEL_STYLE}">공급자명 <span style="color:#ef4444">*</span></label>
            <input id="reg-name" type="text" placeholder="상호명 입력" value="${escapeHtml(d.name || '')}" class="form-field" style="height:40px">
          </div>
          <div>
            <label style="${LABEL_STYLE}">사업자번호 <span style="color:#ef4444">*</span></label>
            <input id="reg-biznum" type="text" placeholder="000-00-00000" value="${escapeHtml(d.bizNum || '')}" class="form-field" style="height:40px">
          </div>
          <div>
            <label style="${LABEL_STYLE}">대표자명 <span style="color:#ef4444">*</span></label>
            <input id="reg-rep" type="text" placeholder="대표자 성명" value="${escapeHtml(d.rep || '')}" class="form-field" style="height:40px">
          </div>
          <div>
            <label style="${LABEL_STYLE}">계약구분 <span style="color:#ef4444">*</span></label>
            ${radioBoxHtml('reg-contract', ['구매대행', '결제대행'], d.contractType || '구매대행')}
          </div>
          <div>
            <label style="${LABEL_STYLE}">담당자명</label>
            <input id="reg-manager" type="text" placeholder="담당자 성명" value="${escapeHtml(d.manager || '')}" class="form-field" style="height:40px">
          </div>
          <div>
            <label style="${LABEL_STYLE}">담당자 연락처 <span style="color:#ef4444">*</span></label>
            <input id="reg-manager-contact" type="text" placeholder="010-0000-0000" value="${escapeHtml(d.managerContact || '')}" class="form-field" style="height:40px">
          </div>
          <div>
            <label style="${LABEL_STYLE}">구매대금 송금방식 <span style="color:#ef4444">*</span></label>
            ${radioStaticHtml(['통장지급', '페이지급'], d.remitType || '통장지급')}
            <input type="hidden" id="reg-remit-type" value="${d.remitType || '통장지급'}">
          </div>
          <div>
            <label style="${LABEL_STYLE}">송금자명</label>
            <input id="reg-remitter" type="text" placeholder="송금자 성명 입력" value="${escapeHtml(d.remitter || '')}" class="form-field" style="height:40px">
          </div>
          <div>
            <label style="${LABEL_STYLE}">공급자 은행</label>
            <select id="reg-bank" class="form-field" style="height:40px;appearance:auto">
              <option value=""${!d.bank ? ' selected' : ''}>-- 은행 선택 --</option>
              ${BANKS.map(b => `<option${d.bank === b ? ' selected' : ''}>${b}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="${LABEL_STYLE}">공급자 계좌번호</label>
            <input id="reg-account" type="text" placeholder="계좌번호 입력 (- 없이)" value="${escapeHtml(d.account || '')}" class="form-field" style="height:40px">
          </div>
        </div>

        <div style="margin-top:28px">
          <label style="${LABEL_STYLE}margin-bottom:12px">첨부서류</label>
          <div style="display:flex;flex-direction:column;gap:12px">
            ${REGISTER_DOC_ITEMS.map(({ label, id, badge, badgeColor, hint, accept }) => `
              <div class="vr-doc-row" style="display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid #e5e7eb;border-radius:10px;padding:14px 18px;flex-wrap:wrap">
                <div style="display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap">
                  <span style="font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;flex-shrink:0;${badgeColor}">${badge}</span>
                  <span style="font-size:0.875rem;font-weight:700;color:#1a2260">${label}</span>
                  <span style="font-size:0.75rem;color:#9ca3af">${hint}</span>
                </div>
                <label for="${id}" id="${id}-btn" class="vr-doc-btn" style="flex-shrink:0;display:inline-flex;align-items:center;gap:6px;border:1px solid #e5e7eb;border-radius:8px;padding:8px 16px;font-size:0.8125rem;font-weight:700;color:#4b5563;cursor:pointer;background:#fff;white-space:nowrap">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                  <span class="file-btn-text">파일 선택</span>
                </label>
                <input id="${id}" type="file" accept="${accept}" style="display:none" onchange="updateFileBtn('${id}')">
              </div>
            `).join('')}
          </div>
        </div>

        <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid #f3f4f6">
          <button type="button" onclick="resetRegisterForm()" class="btn-secondary" style="padding:10px 20px">초기화</button>
          <button type="submit" class="btn-primary" style="padding:10px 20px;display:flex;align-items:center;gap:6px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            등록 신청
          </button>
        </div>
      </form>
    </div>`;

  document.getElementById('register-form').addEventListener('submit', e => {
    e.preventDefault();
    submitVendor();
  });
}

function resetRegisterForm() {
  registerData = {};
  renderTab();
}

function updateFileBtn(id) {
  const input = document.getElementById(id);
  const btn = document.getElementById(id + '-btn');
  const textEl = btn.querySelector('.file-btn-text');
  if (input.files.length) {
    const name = input.files[0].name;
    textEl.textContent = name.length > 18 ? name.slice(0, 15) + '...' : name;
    btn.style.color = '#2B3990';
    btn.style.borderColor = '#d4d8f0';
  } else {
    textEl.textContent = '파일 선택';
    btn.style.color = '#4b5563';
    btn.style.borderColor = '#e5e7eb';
  }
}

function submitVendor() {
  const name = document.getElementById('reg-name').value.trim();
  const bizNum = document.getElementById('reg-biznum').value.trim();
  const rep = document.getElementById('reg-rep').value.trim();
  const managerContact = document.getElementById('reg-manager-contact').value.trim();
  if (!name || !bizNum || !rep || !managerContact) { showAlert('필수 항목을 모두 입력해주세요.'); return; }
  if (!document.getElementById('doc-biz-license').files.length) { showAlert('사업자등록증을 첨부해주세요.'); return; }
  if (!document.getElementById('doc-bankbook').files.length) { showAlert('통장사본을 첨부해주세요.'); return; }

  registerData = {
    name, bizNum, rep,
    contractType: document.querySelector('input[name="reg-contract"]:checked').value,
    manager: document.getElementById('reg-manager').value.trim(),
    managerContact,
    remitType: document.getElementById('reg-remit-type').value,
    remitter: document.getElementById('reg-remitter').value.trim(),
    bank: document.getElementById('reg-bank').value,
    account: document.getElementById('reg-account').value.trim(),
  };

  showAlert('공급자 등록 신청이 완료되었습니다.\n검토 후 승인 처리됩니다.', () => {
    registerData = {};
    setTab('approval');
  });
}

function renderApproval(content) {
  const rows = MOCK_VENDOR_APPROVALS.map((v, i) => `
    <tr onclick="location.href='vendor-detail.html?id=${v.id}'" style="border-bottom:1px solid #f3f4f6;cursor:pointer" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
      <td style="padding:14px 16px;font-size:0.75rem;color:#9ca3af;text-align:center">${i + 1}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#6b7280;white-space:nowrap">${escapeHtml(v.applied)}</td>
      <td style="padding:14px 16px;font-size:0.875rem;font-weight:700;color:#1a2260;white-space:nowrap">${escapeHtml(v.name)}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#4b5563;white-space:nowrap">${escapeHtml(v.biz_num)}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#4b5563;white-space:nowrap">${escapeHtml(v.rep)}</td>
      <td style="padding:14px 16px;text-align:center">${badgeHtml(v.contract_type, CONTRACT_STYLE[v.contract_type] ?? 'background:#f3f4f6;color:#6b7280')}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#4b5563;white-space:nowrap">${escapeHtml(v.manager || '-')}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#4b5563;white-space:nowrap">${escapeHtml(v.manager_contact || '-')}</td>
      <td style="padding:14px 16px;text-align:center">${badgeHtml(v.remit_type, REMIT_TYPE_STYLE[v.remit_type] ?? 'background:#f3f4f6;color:#6b7280')}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#4b5563;white-space:nowrap">${escapeHtml(v.remitter || '-')}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#4b5563;white-space:nowrap">${escapeHtml(v.bank || '-')}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#4b5563;white-space:nowrap">${escapeHtml(v.account || '-')}</td>
      <td style="padding:14px 16px;text-align:center;white-space:nowrap">
        <span style="display:inline-flex;align-items:center;gap:4px;font-size:0.8125rem;font-weight:700;color:#2B3990">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          ${(v.docs || []).length}건
        </span>
      </td>
      <td style="padding:14px 16px;text-align:center">${badgeHtml(v.status, STAT_STYLE[v.status_cd] ?? 'background:#f3f4f6;color:#6b7280')}</td>
      <td style="padding:14px 16px;font-size:0.8125rem;color:#6b7280;text-align:center;white-space:nowrap">${v.reviewed ? escapeHtml(v.reviewed) : '-'}</td>
    </tr>`).join('');

  const listItems = MOCK_VENDOR_APPROVALS.map(v => `
    <div onclick="location.href='vendor-detail.html?id=${v.id}'" style="padding:14px 4px;border-bottom:1px solid #f3f4f6;cursor:pointer">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px;min-width:0">
          <span style="font-size:0.9375rem;font-weight:800;color:#1a2260">${escapeHtml(v.name)}</span>
          ${badgeHtml(v.status, STAT_STYLE[v.status_cd] ?? 'background:#f3f4f6;color:#6b7280')}
        </div>
        <span style="color:#9ca3af;flex-shrink:0">›</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
        ${badgeHtml(v.contract_type, CONTRACT_STYLE[v.contract_type] ?? 'background:#f3f4f6;color:#6b7280')}
        ${badgeHtml(v.remit_type, REMIT_TYPE_STYLE[v.remit_type] ?? 'background:#f3f4f6;color:#6b7280')}
      </div>
      <div style="font-size:0.75rem;color:#9ca3af">${escapeHtml(v.biz_num)} · 담당자 ${escapeHtml(v.manager || '-')} · ${escapeHtml(v.applied)}</div>
    </div>`).join('');

  content.innerHTML = `
    <div class="surface-card" style="margin-top:20px">
      <!-- Desktop table -->
      <div class="hidden md:block" style="overflow-x:auto">
        <table style="width:100%;min-width:1700px">
          <thead>
            <tr style="border-bottom:1px solid #e5e7eb;background:#f1f5f9;font-size:0.75rem;font-weight:800;color:#2B3990">
              <th style="text-align:center;padding:12px 16px;width:60px">순번</th>
              <th style="text-align:left;padding:12px 16px;width:110px">등록일</th>
              <th style="text-align:left;padding:12px 16px;min-width:130px">공급자명</th>
              <th style="text-align:left;padding:12px 16px;width:130px">사업자번호</th>
              <th style="text-align:left;padding:12px 16px;width:90px">대표자명</th>
              <th style="text-align:center;padding:12px 16px;width:100px">계약구분</th>
              <th style="text-align:left;padding:12px 16px;width:90px">담당자명</th>
              <th style="text-align:left;padding:12px 16px;width:130px">담당자연락처</th>
              <th style="text-align:center;padding:12px 16px;width:100px">정산방식</th>
              <th style="text-align:left;padding:12px 16px;width:90px">송금자명</th>
              <th style="text-align:left;padding:12px 16px;width:100px">공급자은행</th>
              <th style="text-align:left;padding:12px 16px;width:150px">계좌번호</th>
              <th style="text-align:center;padding:12px 16px;width:90px">첨부서류</th>
              <th style="text-align:center;padding:12px 16px;width:100px">승인상태</th>
              <th style="text-align:center;padding:12px 16px;width:110px">승인일</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>

      <!-- Mobile list -->
      <div class="md:hidden" style="padding:4px 16px">${listItems}</div>
    </div>`;
}

// Initialize: check URL for tab param (e.g. returning from detail page)
const _initTab = new URLSearchParams(location.search).get('tab');
setTab(_initTab === 'approval' ? 'approval' : 'register');
</script>
</body>
</html>
