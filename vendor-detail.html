<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>공급자 상세 - BIZLINK</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: { 50:'#eef0f9',100:'#d4d8f0',400:'#5a6abf',500:'#2B3990',600:'#24307a',700:'#1a2260' }, navy:'#1a2260' },
        boxShadow: { card:'0 2px 8px rgba(0,0,0,0.08)', popup:'0 8px 32px rgba(0,0,0,0.18)' }
      }}
    };
  </script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/header.js"></script>
  <style>
    @media (max-width: 767px) {
      .vd-card { padding: 20px 16px !important; }
      .vd-grid-2 { grid-template-columns: 1fr !important; gap: 16px !important; }
      .vd-header-row { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }
      .vd-header-row > div:last-child { text-align: left !important; }
    }
  </style>
</head>
<body>
<div class="app-page">
  <div id="app-header"></div>
  <div class="app-main" style="max-width:1900px">
    <div id="detail-content"></div>
  </div>
</div>

<script>
if (!requireAuth()) throw new Error();
renderHeader();

const params = new URLSearchParams(location.search);
const vendorId = parseInt(params.get('id'), 10);
const vendor = MOCK_VENDOR_APPROVALS.find(v => v.id === vendorId);

const STAT_CONFIG = {
  APPROVED:  { bg: '#eef0f9', color: '#2B3990', label: '승인완료' },
  REVIEWING: { bg: '#fef9c3', color: '#a16207', label: '검토중'   },
  REJECTED:  { bg: '#fef2f2', color: '#dc2626', label: '반려'     },
};

const BACK_URL = 'vendors.html?tab=approval';
const LABEL_STYLE = 'font-size:0.75rem;font-weight:700;color:#9ca3af;display:block;margin-bottom:6px';
const BANKS = ['국민은행', '신한은행', '하나은행', '우리은행', '농협은행', '기업은행'];
const docIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

function radioBoxHtml(name, options, selected) {
  return `<div class="form-field" style="height:40px;display:flex;align-items:center;gap:24px">
    ${options.map(opt => `
      <label style="display:flex;align-items:center;gap:6px;font-size:0.875rem;color:#1a2260;cursor:pointer;font-weight:500">
        <input type="radio" name="${name}" value="${opt}" ${opt === selected ? 'checked' : ''} style="accent-color:#2B3990;width:16px;height:16px">
        ${opt}
      </label>`).join('')}
  </div>`;
}

function textFieldHtml(label, key, { editable = false, required = false, placeholder = '' } = {}) {
  const value = vendor[key];
  return `
    <div>
      <label style="${LABEL_STYLE}">${label}${required ? ' <span style="color:#ef4444">*</span>' : ''}</label>
      ${editable
        ? `<input id="edit-${key}" type="text" placeholder="${placeholder}" value="${escapeHtml(value ?? '')}" class="form-field" style="height:40px">`
        : `<div class="form-field" style="height:40px;background:#f9fafb;color:#1a2260;font-weight:500">${escapeHtml(value || '-')}</div>`}
    </div>`;
}

function radioFieldHtml(label, name, key, options, { editable = false, required = false } = {}) {
  const value = vendor[key];
  const body = editable
    ? radioBoxHtml(name, options, value)
    : `<div class="form-field" style="height:40px;gap:20px;background:#f9fafb">
        ${options.map(opt => `
          <span style="display:inline-flex;align-items:center;gap:6px;font-size:0.875rem;font-weight:${opt === value ? '700' : '500'};color:${opt === value ? '#1a2260' : '#c7cad1'}">
            <span style="width:14px;height:14px;border-radius:50%;border:2px solid ${opt === value ? '#2B3990' : '#d1d5db'};display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">
              ${opt === value ? '<span style="width:6px;height:6px;border-radius:50%;background:#2B3990"></span>' : ''}
            </span>
            ${opt}
          </span>`).join('')}
      </div>`;
  return `<div><label style="${LABEL_STYLE}">${label}${required ? ' <span style="color:#ef4444">*</span>' : ''}</label>${body}</div>`;
}

function selectFieldHtml(label, key, options, { editable = false } = {}) {
  const value = vendor[key];
  return `
    <div>
      <label style="${LABEL_STYLE}">${label}</label>
      ${editable
        ? `<select id="edit-${key}" class="form-field" style="height:40px;appearance:auto">
            <option value=""${!value ? ' selected' : ''}>-- 은행 선택 --</option>
            ${options.map(b => `<option${value === b ? ' selected' : ''}>${b}</option>`).join('')}
          </select>`
        : `<div class="form-field" style="height:40px;background:#f9fafb;color:#1a2260;font-weight:500">${escapeHtml(value || '-')}</div>`}
    </div>`;
}

function formatFileSize(bytes) {
  return bytes < 1024 * 1024 ? `${Math.max(1, Math.round(bytes / 1024))}KB` : `${(bytes / 1024 / 1024).toFixed(1)}MB`;
}

function docsHtml() {
  const canEdit = vendor.status_cd === 'REJECTED';
  const docs = vendor.docs || [];
  const chips = docs.map((doc, i) => `
    <span style="display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:#f8f9ff;border:1px solid #d4d8f0;border-radius:8px;font-size:0.8125rem;color:#1a2260;max-width:100%">
      ${docIcon}
      <span style="font-weight:700;color:#2B3990;flex-shrink:0">[${escapeHtml(doc.type)}]</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(doc.name)}</span>
      <span style="color:#9ca3af;flex-shrink:0">(${escapeHtml(doc.size)})</span>
      ${canEdit ? `<button type="button" onclick="deleteDoc(${i})" style="flex-shrink:0;width:18px;height:18px;border:none;background:none;color:#9ca3af;cursor:pointer;display:flex;align-items:center;justify-content:center" title="삭제">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>` : ''}
    </span>`).join('');

  const list = docs.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:8px">${chips}</div>`
    : `<p style="font-size:0.875rem;color:#9ca3af">첨부된 서류가 없습니다.</p>`;

  const addBtn = canEdit ? `
    <label style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 14px;border:1.5px dashed #d4d8f0;border-radius:8px;color:#2B3990;font-size:0.8125rem;font-weight:700;cursor:pointer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      서류 추가
      <input type="file" accept=".pdf,.jpg,.jpeg,.png,.hwp,.xlsx" style="display:none" onchange="addDoc(this)">
    </label>` : '';

  return list + addBtn;
}

function deleteDoc(index) {
  vendor.docs.splice(index, 1);
  renderDetail();
}

function addDoc(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  if (!vendor.docs) vendor.docs = [];
  vendor.docs.push({ type: '추가서류', name: file.name, size: formatFileSize(file.size) });
  renderDetail();
}

function saveRemitter() {
  const value = document.getElementById('edit-remitter').value.trim();
  if (!value) { showAlert('송금자명을 입력해주세요.'); return; }
  vendor.remitter = value;
  renderDetail();
  showAlert('송금자명이 변경되었습니다.');
}

function requestReapproval() {
  const name = document.getElementById('edit-name').value.trim();
  const bizNum = document.getElementById('edit-biz_num').value.trim();
  const rep = document.getElementById('edit-rep').value.trim();
  const managerContact = document.getElementById('edit-manager_contact').value.trim();
  if (!name || !bizNum || !rep || !managerContact) { showAlert('필수 항목을 모두 입력해주세요.'); return; }

  showConfirm('재승인 요청 하시겠습니까?', () => {
    vendor.name = name;
    vendor.biz_num = bizNum;
    vendor.rep = rep;
    vendor.contract_type = document.querySelector('input[name="edit-contract"]:checked').value;
    vendor.manager = document.getElementById('edit-manager').value.trim();
    vendor.manager_contact = managerContact;
    vendor.remit_type = document.querySelector('input[name="edit-remit-type"]:checked').value;
    vendor.remitter = document.getElementById('edit-remitter').value.trim();
    vendor.bank = document.getElementById('edit-bank').value;
    vendor.account = document.getElementById('edit-account').value.trim();
    vendor.status_cd = 'REVIEWING';
    vendor.status = '검토중';
    vendor.reject_reason = null;
    vendor.reviewed = null;
    vendor.applied = toDateStr(new Date());
    showAlert('재승인 요청이 완료되었습니다.\n검토 후 승인 처리됩니다.', () => {
      location.href = BACK_URL;
    });
  });
}

function renderDetail() {
  const content = document.getElementById('detail-content');

  if (!vendor) {
    content.innerHTML = `
      <div style="padding:64px;text-align:center">
        <p style="color:#6b7280;margin-bottom:12px">공급자 정보를 찾을 수 없습니다.</p>
        <a href="${BACK_URL}" style="color:#2B3990;font-weight:600">← 목록으로 돌아가기</a>
      </div>`;
    return;
  }

  const st = STAT_CONFIG[vendor.status_cd] || { bg: '#f3f4f6', color: '#6b7280', label: vendor.status };
  const canEditAll = vendor.status_cd === 'REJECTED';

  content.innerHTML = `
    <div class="vd-card" style="margin:20px auto 0;width:100%;max-width:860px;border-radius:1rem;border:1px solid #e5e7eb;background:#fff;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">

      <!-- Header -->
      <div class="vd-header-row" style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #f3f4f6">
        <div style="display:flex;align-items:center;gap:10px">
          <h1 style="font-size:1.25rem;font-weight:800;color:#1a2260">${escapeHtml(vendor.name)}</h1>
          <span style="font-size:0.75rem;font-weight:700;padding:3px 10px;border-radius:9999px;background:${st.bg};color:${st.color}">${st.label}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:0.75rem;color:#9ca3af;font-weight:700;margin-bottom:2px">등록일</div>
          <div style="font-size:1rem;font-weight:800;color:#1a2260">${escapeHtml(vendor.applied)}</div>
        </div>
      </div>

      ${vendor.status_cd === 'REJECTED' && vendor.reject_reason ? `
        <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px 16px;margin-bottom:24px">
          <div style="font-size:0.75rem;color:#dc2626;font-weight:700;margin-bottom:4px">반려 사유</div>
          <div style="font-size:0.8125rem;color:#b91c1c;line-height:1.5">${escapeHtml(vendor.reject_reason)}</div>
        </div>
      ` : ''}

      <!-- Field grid -->
      <div class="vd-grid-2" style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px">
        ${textFieldHtml('공급자명', 'name', { editable: canEditAll, required: true })}
        ${textFieldHtml('사업자번호', 'biz_num', { editable: canEditAll, required: true })}
        ${textFieldHtml('대표자명', 'rep', { editable: canEditAll, required: true })}
        ${radioFieldHtml('계약구분', 'edit-contract', 'contract_type', ['구매대행', '결제대행'], { editable: canEditAll, required: true })}
        ${textFieldHtml('담당자명', 'manager', { editable: canEditAll })}
        ${textFieldHtml('담당자 연락처', 'manager_contact', { editable: canEditAll, required: true })}
        ${radioFieldHtml('구매대금 송금방식', 'edit-remit-type', 'remit_type', ['통장지급', '페이지급'], { editable: canEditAll, required: true })}
        ${textFieldHtml('송금자명', 'remitter', { editable: true })}
        ${selectFieldHtml('공급자 은행', 'bank', BANKS, { editable: canEditAll })}
        ${textFieldHtml('공급자 계좌번호', 'account', { editable: canEditAll })}
        <div>
          <label style="${LABEL_STYLE}">승인상태</label>
          <div class="form-field" style="height:40px;background:#f9fafb">
            <span style="font-size:0.8125rem;font-weight:700;padding:3px 10px;border-radius:9999px;background:${st.bg};color:${st.color}">${st.label}</span>
          </div>
        </div>
        <div>
          <label style="${LABEL_STYLE}">승인일</label>
          <div class="form-field" style="height:40px;background:#f9fafb;color:#1a2260;font-weight:500">${vendor.reviewed ? escapeHtml(vendor.reviewed) : '-'}</div>
        </div>
        ${vendor.memo ? `
          <div style="grid-column:1/-1">
            <label style="${LABEL_STYLE}">비고</label>
            <div class="form-field" style="height:40px;background:#f9fafb;color:#1a2260;font-weight:500">${escapeHtml(vendor.memo)}</div>
          </div>
        ` : ''}
      </div>

      <!-- Documents -->
      <div style="margin-top:28px">
        <label style="${LABEL_STYLE}margin-bottom:12px">첨부서류</label>
        ${docsHtml()}
      </div>

      <!-- Footer -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid #f3f4f6">
        <a href="${BACK_URL}" class="btn-secondary" style="padding:10px 20px;display:inline-flex;align-items:center;gap:6px;text-decoration:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          목록으로
        </a>
        ${canEditAll
          ? `<button type="button" onclick="requestReapproval()" class="btn-primary" style="padding:10px 20px;display:flex;align-items:center;gap:6px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              재승인 요청
            </button>`
          : `<button type="button" onclick="saveRemitter()" class="btn-primary" style="padding:10px 20px;display:flex;align-items:center;gap:6px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              저장하기
            </button>`}
      </div>
    </div>
  `;
}

renderDetail();
</script>
</body>
</html>
