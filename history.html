<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>구매내역 - BIZLINK</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: { 50:'#eef0f9',100:'#d4d8f0',400:'#5a6abf',500:'#2B3990',600:'#24307a',700:'#1a2260' }, navy:'#1a2260' },
        boxShadow: { card:'0 2px 8px rgba(0,0,0,0.08)', popup:'0 8px 32px rgba(0,0,0,0.18)' }
      }}
    };
  </script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/header.js"></script>
  <style>
    @media (max-width: 767px) {
      .hist-filter-wrap { padding: 12px !important; }
      .hist-filter-box { padding: 10px 12px !important; flex-direction: column !important; align-items: stretch !important; }
      .hist-row-dates { flex: 1 1 100%; }
      .hist-date-wrap { flex: 1; min-width: 0; }
      .hist-date-input { width: 100% !important; }
      .hist-row-ranges { flex: 1 1 100%; width: 100%; }
      .hist-row-ranges .range-btn { flex: 1; text-align: center; }
      .hist-row-filters { flex: 1 1 100%; margin-left: 0 !important; width: 100%; }
      .hist-row-filters select { flex: 1; min-width: 0; }
      .hist-search-form { flex: 1 1 100%; }
      .hist-keyword-input { width: 100% !important; }
    }
    .hist-mobile-list { display: flex; flex-direction: column; gap: 10px; padding: 14px; }
    @media (min-width: 768px) {
      .hist-mobile-list { display: none; }
    }
  </style>
</head>
<body>
<div class="app-page">
  <div id="app-header"></div>
  <div class="app-main" style="max-width:1900px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:8px">
      <a href="order.html" style="display:flex;align-items:center;gap:6px;font-size:0.875rem;color:#9ca3af;text-decoration:none;font-weight:500">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        주문으로
      </a>
      <span style="color:#e5e7eb">/</span>
      <span style="font-size:1.125rem;font-weight:800;color:#1a2260">구매내역</span>
    </div>

    <div class="surface-card">
      <!-- Filters -->
      <div class="hist-filter-wrap" style="background:#f3f4f6;padding:20px;border-radius:1rem 1rem 0 0">
        <div class="hist-filter-box" style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px 16px;flex-wrap:wrap">
          <div class="hist-row-dates" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:0.75rem;font-weight:700;color:#6b7280;flex-shrink:0">주문일</span>
            <div class="form-field hist-date-wrap" style="width:auto;gap:6px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" style="flex-shrink:0"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
              <input type="date" id="start-dt" class="hist-date-input" style="border:none;background:transparent;font-size:0.75rem;color:#1a2260;outline:none;width:130px">
            </div>
            <span style="font-size:0.75rem;color:#d1d5db;flex-shrink:0">~</span>
            <div class="form-field hist-date-wrap" style="width:auto;gap:6px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" style="flex-shrink:0"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
              <input type="date" id="end-dt" class="hist-date-input" style="border:none;background:transparent;font-size:0.75rem;color:#1a2260;outline:none;width:130px">
            </div>
          </div>
          <div class="hist-row-ranges" style="display:flex;gap:8px">
            <button onclick="setRange(3)" class="range-btn" data-days="3" style="border:1px solid #e5e7eb;border-radius:8px;padding:6px 10px;font-size:0.75rem;font-weight:700;color:#4b5563;background:#fff;cursor:pointer">3일</button>
            <button onclick="setRange(7)" class="range-btn" data-days="7" style="border-radius:8px;padding:6px 10px;font-size:0.75rem;font-weight:700;color:#4b5563;background:#fff;border:1px solid #e5e7eb;cursor:pointer">7일</button>
            <button onclick="setRange(30)" class="range-btn" data-days="30" style="border:1px solid #e5e7eb;border-radius:8px;padding:6px 10px;font-size:0.75rem;font-weight:700;color:#4b5563;background:#fff;cursor:pointer">1개월</button>
          </div>
          <div class="hist-row-filters" style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <select id="contract-filter" style="height:36px;border:1px solid #e5e7eb;border-radius:8px;padding:0 12px;font-size:0.75rem;font-weight:600;color:#4b5563;background:#fff;outline:none">
              <option value="ALL">계약구분</option>
              <option value="결제대행">결제대행</option>
              <option value="구매대행">구매대행</option>
            </select>
            <select id="status-filter" style="height:36px;border:1px solid #e5e7eb;border-radius:8px;padding:0 12px;font-size:0.75rem;font-weight:600;color:#4b5563;background:#fff;outline:none">
              <option value="ALL">주문상태</option>
              <option value="RECEIVED">주문접수</option>
              <option value="DELIVERING">배송중</option>
              <option value="COMPLETED">배송완료</option>
              <option value="CANCELLED">취소</option>
            </select>
            <select id="vendor-filter" style="height:36px;border:1px solid #e5e7eb;border-radius:8px;padding:0 12px;font-size:0.75rem;font-weight:600;color:#4b5563;background:#fff;outline:none">
              <option value="ALL">공급처</option>
            </select>
            <form id="search-form" class="hist-search-form" style="display:flex;align-items:center;gap:4px">
              <div class="form-field" style="width:auto;flex:1;gap:6px;padding:0 10px;height:36px">
                <input type="text" id="keyword-input" placeholder="주문번호, 공급처" class="hist-keyword-input" style="border:none;background:transparent;font-size:0.75rem;color:#1a2260;outline:none;width:200px">
              </div>
              <button type="submit" style="display:flex;align-items:center;gap:4px;height:36px;border-radius:8px;padding:0 12px;background:#2B3990;color:#fff;font-size:0.75rem;font-weight:700;border:none;cursor:pointer;flex-shrink:0">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                검색
              </button>
            </form>
            <button id="excel-download-btn" type="button" style="display:flex;align-items:center;gap:4px;height:36px;border-radius:8px;padding:0 12px;background:#1f9d55;color:#fff;font-size:0.75rem;font-weight:700;border:none;cursor:pointer;flex-shrink:0">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              엑셀다운
            </button>
          </div>
        </div>
      </div>

      <!-- Desktop table -->
      <div class="hidden md:block" style="overflow-x:auto">
        <table style="width:100%;min-width:1900px">
          <thead>
            <tr style="border-bottom:1px solid #e5e7eb;background:#f1f5f9;font-size:0.75rem;font-weight:800;color:#2B3990">
              <th style="text-align:center;padding:12px 20px;width:70px;white-space:nowrap">순번</th>
              <th style="text-align:left;padding:12px 20px;width:150px">주문일</th>
              <th style="text-align:left;padding:12px 20px;width:190px">주문번호</th>
              <th style="text-align:left;padding:12px 20px;min-width:150px">공급처</th>
              <th style="text-align:center;padding:12px 20px;width:100px">계약구분</th>
              <th style="text-align:center;padding:12px 20px;width:120px">주문상태</th>
              <th style="text-align:center;padding:12px 20px;width:100px">결제카드</th>
              <th style="text-align:right;padding:12px 20px;width:130px">상품금액</th>
              <th style="text-align:right;padding:12px 20px;width:150px">플랫폼수수료(5.5%)</th>
              <th style="text-align:right;padding:12px 20px;width:130px">결제금액</th>
              <th style="text-align:center;padding:12px 20px;width:110px">송금방식</th>
              <th style="text-align:left;padding:12px 20px;width:130px">송금일</th>
              <th style="text-align:right;padding:12px 20px;width:130px">송금액</th>
              <th style="text-align:left;padding:12px 20px;width:120px">송금은행</th>
              <th style="text-align:center;padding:12px 20px;width:100px">거래명세표</th>
            </tr>
          </thead>
          <tbody id="history-tbody">
            <tr><td colspan="14" style="text-align:center;padding:5rem;color:#9ca3af"><div class="loading-spinner-sm" style="margin:0 auto"></div></td></tr>
          </tbody>
        </table>
      </div>

      <!-- Mobile list -->
      <div id="history-cards-mobile" class="hist-mobile-list">
        <div style="text-align:center;padding:3rem 0"><div class="loading-spinner-sm" style="margin:0 auto"></div></div>
      </div>

      <div id="history-pagination"></div>
    </div>
  </div>
</div>

<script>
if (!requireAuth()) throw new Error();

const STAT_STYLE = {
  COMPLETED:  'background:#eef0f9;color:#5a6abf',
  DELIVERING: 'background:#eef0f9;color:#5a6abf',
  RECEIVED:   'background:#fef9c3;color:#a16207',
  CANCELLED:  'background:#fef2f2;color:#dc2626',
};

let allOrders = [], keyword = '', vendorFilter = 'ALL', statusFilter = 'ALL', contractFilter = 'ALL';
let currentPage = 1;
const PAGE_SIZE = 15;

function toDateStr(d) { return d.toISOString().slice(0, 10); }

// Mock order dates are fixed in the past, so anchor range presets to the
// latest mock order date rather than the real "today" (which would show
// nothing once real time passes the mock data's date range).
function getLatestOrderDate() {
  const newDates = getNewOrders().map(n => n.order.ORDER_DT.slice(0, 10));
  const dates = [...MOCK_ING_ORDERS, ...MOCK_END_ORDERS].map(o => o.ORDER_DT.slice(0, 10)).concat(newDates);
  return new Date(dates.sort().pop());
}

function setActiveRangeBtn(days) {
  document.querySelectorAll('.range-btn').forEach(btn => {
    const active = parseInt(btn.dataset.days) === days;
    btn.style.background = active ? '#5a6abf' : '#fff';
    btn.style.color = active ? '#fff' : '#4b5563';
    btn.style.borderColor = active ? '#5a6abf' : '#e5e7eb';
  });
}

function setRange(days) {
  const end = getLatestOrderDate(), start = new Date(end);
  start.setDate(end.getDate() - days);
  document.getElementById('start-dt').value = toDateStr(start);
  document.getElementById('end-dt').value = toDateStr(end);
  setActiveRangeBtn(days);
  loadOrders();
}

async function loadOrders() {
  const start = document.getElementById('start-dt').value;
  const end = document.getElementById('end-dt').value;
  const [ing, done] = await Promise.all([api.getIngOrders(start, end), api.getEndOrders(start, end)]);
  allOrders = [...ing, ...done].sort((a, b) => b.ORDER_DT.localeCompare(a.ORDER_DT));
  currentPage = 1;
  renderTable();
}

function goToPage(p) {
  currentPage = p;
  renderTable();
}

function renderPagination(totalCount) {
  const wrap = document.getElementById('history-pagination');
  const totalPages = Math.ceil(totalCount / PAGE_SIZE);
  if (totalPages <= 1) { wrap.innerHTML = ''; return; }
  const btn = (label, page, disabled, active) => `
    <button ${disabled ? 'disabled' : `onclick="goToPage(${page})"`} style="min-width:32px;height:32px;padding:0 6px;border-radius:8px;border:1px solid ${active ? '#2B3990' : '#e5e7eb'};background:${active ? '#2B3990' : '#fff'};color:${disabled ? '#d1d5db' : active ? '#fff' : '#4b5563'};font-size:0.8125rem;font-weight:700;cursor:${disabled ? 'default' : 'pointer'}">${label}</button>`;
  let html = '<div style="display:flex;align-items:center;justify-content:center;gap:6px;padding:20px;border-top:1px solid #f3f4f6">';
  html += btn('‹', currentPage - 1, currentPage === 1, false);
  for (let p = 1; p <= totalPages; p++) html += btn(p, p, false, p === currentPage);
  html += btn('›', currentPage + 1, currentPage === totalPages, false);
  html += '</div>';
  wrap.innerHTML = html;
}

function isStatementRegistered(o) {
  return o.STATEMENT_YN === 'Y' || getRegisteredStatements().includes(o.ORDER_NO);
}

function filteredOrders() {
  return allOrders.filter(o => {
    const matchV = vendorFilter === 'ALL' || o.STORE_NM === vendorFilter;
    const matchS = statusFilter === 'ALL' || o.ORDER_STAT_CD === statusFilter;
    const matchC = contractFilter === 'ALL' || o.CONTRACT_TYPE === contractFilter;
    const kw = keyword.toLowerCase();
    const matchK = !kw || o.ORDER_NO.toLowerCase().includes(kw) || o.STORE_NM.toLowerCase().includes(kw);
    return matchV && matchS && matchC && matchK;
  });
}

function downloadExcel() {
  const header = ['주문일', '주문번호', '공급처', '계약구분', '주문상태', '결제카드', '상품금액', '플랫폼수수료', '결제금액', '송금방식', '송금일', '송금액', '송금은행', '거래명세표'];
  const rows = filteredOrders().map(o => {
    const fee = Math.round(o.TOTAL_PRICE * PLATFORM_FEE_RATE);
    return [
      o.ORDER_DT, o.ORDER_NO, o.STORE_NM, o.CONTRACT_TYPE ?? '-', o.ORDER_STAT_NM, o.PAY_CARD ?? '-',
      o.TOTAL_PRICE, fee, o.TOTAL_PRICE + fee, o.REMIT_TYPE ?? '-', o.REMIT_DT ?? '-',
      o.REMIT_AMOUNT ?? '', o.REMIT_BANK ?? '-', isStatementRegistered(o) ? 'O' : 'X',
    ];
  });
  const csv = [header, ...rows]
    .map(cols => cols.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `구매내역_${toDateStr(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function renderTable() {
  const orders = filteredOrders();
  const tbody = document.getElementById('history-tbody');
  const cardsWrap = document.getElementById('history-cards-mobile');

  if (orders.length === 0) {
    tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;padding:6rem 0;color:#9ca3af">
      <div style="margin:0 auto 12px;width:40px;height:40px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px">▭</div>
      <p style="font-size:0.875rem;font-weight:600">구매내역이 없습니다.</p>
    </td></tr>`;
    cardsWrap.innerHTML = `<div style="text-align:center;padding:4rem 20px;color:#9ca3af">
      <div style="margin:0 auto 12px;width:40px;height:40px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px">▭</div>
      <p style="font-size:0.875rem;font-weight:600">구매내역이 없습니다.</p>
    </div>`;
    renderPagination(0);
    return;
  }

  const totalPages = Math.max(1, Math.ceil(orders.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const pageOrders = orders.slice(startIdx, startIdx + PAGE_SIZE);

  tbody.innerHTML = pageOrders.map((o, i) => {
    const seq = orders.length - startIdx - i;
    const fee = Math.round(o.TOTAL_PRICE * PLATFORM_FEE_RATE);
    const total = o.TOTAL_PRICE + fee;
    const statStyle = STAT_STYLE[o.ORDER_STAT_CD] ?? 'background:#f3f4f6;color:#6b7280';
    return `
      <tr onclick="location.href='history-detail.html?no=${encodeURIComponent(o.ORDER_NO)}'" style="border-bottom:1px solid #f3f4f6;cursor:pointer" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
        <td style="padding:16px 20px;text-align:center;font-size:0.875rem;color:#9ca3af">${seq}</td>
        <td style="padding:16px 20px;font-size:0.875rem;color:#6b7280;white-space:nowrap">${o.ORDER_DT}</td>
        <td style="padding:16px 20px;font-size:0.875rem;font-family:monospace;color:#1a2260;font-weight:600">${escapeHtml(o.ORDER_NO)}</td>
        <td style="padding:16px 20px;font-size:0.875rem;color:#1a2260">${escapeHtml(o.STORE_NM)}</td>
        <td style="padding:16px 20px;text-align:center;font-size:0.875rem;color:#4b5563">${escapeHtml(o.CONTRACT_TYPE ?? '-')}</td>
        <td style="padding:16px 20px;text-align:center">
          <span style="font-size:0.75rem;font-weight:700;padding:4px 10px;border-radius:9999px;${statStyle}">${escapeHtml(o.ORDER_STAT_NM)}</span>
        </td>
        <td style="padding:16px 20px;text-align:center;font-size:0.875rem;color:#4b5563">${escapeHtml(o.PAY_CARD ?? '-')}</td>
        <td style="padding:16px 20px;text-align:right;font-size:0.875rem;color:#4b5563">${comma(o.TOTAL_PRICE)}</td>
        <td style="padding:16px 20px;text-align:right;font-size:0.875rem;color:#4b5563">${comma(fee)}</td>
        <td style="padding:16px 20px;text-align:right;font-size:0.875rem;font-weight:800;color:#1a2260">${comma(total)}</td>
        <td style="padding:16px 20px;text-align:center;font-size:0.875rem;color:#4b5563">${escapeHtml(o.REMIT_TYPE ?? '-')}</td>
        <td style="padding:16px 20px;text-align:left;font-size:0.875rem;color:#6b7280;white-space:nowrap">${escapeHtml(o.REMIT_DT ?? '-')}</td>
        <td style="padding:16px 20px;text-align:right;font-size:0.875rem;color:#4b5563">${o.REMIT_AMOUNT != null ? comma(o.REMIT_AMOUNT) : '-'}</td>
        <td style="padding:16px 20px;text-align:left;font-size:0.875rem;color:#4b5563">${escapeHtml(o.REMIT_BANK ?? '-')}</td>
        <td style="padding:16px 20px;text-align:center">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:9999px;font-size:0.75rem;font-weight:800;${isStatementRegistered(o) ? 'background:#eef0f9;color:#2B3990' : 'background:#fef2f2;color:#dc2626'}">${isStatementRegistered(o) ? 'O' : 'X'}</span>
        </td>
      </tr>`;
  }).join('');

  cardsWrap.innerHTML = pageOrders.map((o, i) => {
    const seq = orders.length - startIdx - i;
    const fee = Math.round(o.TOTAL_PRICE * PLATFORM_FEE_RATE);
    const total = o.TOTAL_PRICE + fee;
    const statStyle = STAT_STYLE[o.ORDER_STAT_CD] ?? 'background:#f3f4f6;color:#6b7280';
    return `
      <div onclick="location.href='history-detail.html?no=${encodeURIComponent(o.ORDER_NO)}'" style="border:1px solid #e5e7eb;border-radius:12px;padding:14px;cursor:pointer;background:#fff">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">
          <span style="font-size:0.875rem;font-family:monospace;font-weight:700;color:#1a2260">${escapeHtml(o.ORDER_NO)}</span>
          <span style="font-size:0.75rem;font-weight:700;padding:4px 10px;border-radius:9999px;white-space:nowrap;${statStyle}">${escapeHtml(o.ORDER_STAT_NM)}</span>
        </div>
        <div style="font-size:0.8125rem;color:#6b7280;margin-bottom:12px">No.${seq} · ${o.ORDER_DT} · ${escapeHtml(o.STORE_NM)}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid #f3f4f6">
          <span style="font-size:0.75rem;color:#9ca3af">상품 ${comma(o.TOTAL_PRICE)}원 + 수수료 ${comma(fee)}원</span>
          <span style="font-size:0.9375rem;font-weight:800;color:#1a2260">${comma(total)}원</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6">
          <div style="font-size:0.6875rem;color:#9ca3af">계약구분 <span style="color:#4b5563;font-weight:600">${escapeHtml(o.CONTRACT_TYPE ?? '-')}</span></div>
          <div style="font-size:0.6875rem;color:#9ca3af">결제카드 <span style="color:#4b5563;font-weight:600">${escapeHtml(o.PAY_CARD ?? '-')}</span></div>
          <div style="font-size:0.6875rem;color:#9ca3af">송금방식 <span style="color:#4b5563;font-weight:600">${escapeHtml(o.REMIT_TYPE ?? '-')}</span></div>
          <div style="font-size:0.6875rem;color:#9ca3af">송금일 <span style="color:#4b5563;font-weight:600">${escapeHtml(o.REMIT_DT ?? '-')}</span></div>
          <div style="font-size:0.6875rem;color:#9ca3af">송금액 <span style="color:#4b5563;font-weight:600">${o.REMIT_AMOUNT != null ? comma(o.REMIT_AMOUNT) + '원' : '-'}</span></div>
          <div style="font-size:0.6875rem;color:#9ca3af">송금은행 <span style="color:#4b5563;font-weight:600">${escapeHtml(o.REMIT_BANK ?? '-')}</span></div>
          <div style="font-size:0.6875rem;color:#9ca3af">거래명세표 <span style="font-weight:800;${isStatementRegistered(o) ? 'color:#2B3990' : 'color:#dc2626'}">${isStatementRegistered(o) ? 'O' : 'X'}</span></div>
        </div>
      </div>`;
  }).join('');

  renderPagination(orders.length);
}

// Init
renderHeader();

// Populate vendor filter
MOCK_VENDORS.forEach(v => {
  const opt = document.createElement('option');
  opt.value = v.VENDOR_NM;
  opt.textContent = v.VENDOR_NM;
  document.getElementById('vendor-filter').appendChild(opt);
});

document.getElementById('vendor-filter').addEventListener('change', e => { vendorFilter = e.target.value; currentPage = 1; renderTable(); });
document.getElementById('status-filter').addEventListener('change', e => { statusFilter = e.target.value; currentPage = 1; renderTable(); });
document.getElementById('contract-filter').addEventListener('change', e => { contractFilter = e.target.value; currentPage = 1; renderTable(); });
document.getElementById('excel-download-btn').addEventListener('click', downloadExcel);
document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  keyword = document.getElementById('keyword-input').value.trim();
  currentPage = 1;
  renderTable();
});
document.getElementById('start-dt').addEventListener('change', () => { setActiveRangeBtn(null); loadOrders(); });
document.getElementById('end-dt').addEventListener('change', () => { setActiveRangeBtn(null); loadOrders(); });

setRange(7);
</script>
</body>
